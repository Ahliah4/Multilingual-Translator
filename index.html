<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingua — Translation App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">
      <span></span>
      Lingua
    </div>
    <div class="tagline">Real-time language translation</div>
  </header>

  <div class="card">

    <!-- Language Bar -->
    <div class="lang-bar">
      <div class="lang-group">
        <span class="lang-label">From</span>
        <select id="sourceLang">
          <option value="auto">Auto Detect</option>
          <option value="en" selected>English</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="sw">Swahili</option>
          <option value="yo">Yoruba</option>
          <option value="zu">Zulu</option>
        </select>
      </div>

      <button class="swap-btn" onclick="swapLanguages()" title="Swap languages">⇄</button>

      <div class="lang-group">
        <span class="lang-label">To</span>
        <select id="targetLang">
          <option value="fr" selected>French</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="sw">Swahili</option>
          <option value="yo">Yoruba</option>
          <option value="zu">Zulu</option>
        </select>
      </div>
    </div>

    <!-- Panels -->
    <div class="panels">

      <!-- Input Panel -->
      <div class="panel">
        <div class="panel-header">Source Text</div>
        <textarea id="inputText" maxlength="500" placeholder="Begin typing here…">Hello, how are you</textarea>
        <div class="char-count"><span id="charCount">19</span> / 500</div>
        <div class="panel-actions">
          <button class="icon-btn" onclick="speakInput()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            Listen
          </button>
          <button class="icon-btn" onclick="copyInput()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
        </div>
        <div class="divider-icon">→</div>
      </div>

      <!-- Output Panel -->
      <div class="panel">
        <div class="panel-header">Translation</div>
        <div class="status-bar" id="statusMessage"></div>
        <div id="outputText" class="output-box">Bonjour, comment allez-vous</div>
        <div class="panel-actions">
          <button class="icon-btn" onclick="speakOutput()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            Listen
          </button>
          <button class="icon-btn" onclick="copyOutput()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
        </div>
      </div>

    </div>

    <!-- Translate Button -->
    <div class="translate-wrap">
      <div class="hint">↵ Press Ctrl + Enter to translate</div>
      <button class="translate-btn" onclick="translateText()">
        <span>Translate</span>
      </button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
